version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: gateway-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gateway_db
      MYSQL_USER: gateway_user
      MYSQL_PASSWORD: gateway_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
